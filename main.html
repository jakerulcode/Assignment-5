<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>github | home</title>
    <!-- icon cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <!-- taiwnd+daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
      .active-tab {
        background-color:#4A00FF;
        color: white;
      }
    </style>
  </head>
  <body>
    <header
      class="navbar bg-base-100 shadow-sm py-4 px-4 md:px-20 flex-col md:flex-row gap-3 md:gap-0 mb-[60px]"
    >
      <div class="flex-1">
        <div class="flex items-center gap-2 justify-center md:justify-start">
          <img src="./assets/github-logo.png" alt="" class="w-8 md:w-9" />
          <h2 class="text-lg md:text-2xl font-bold">GitHub Issues Tracker</h2>
        </div>
      </div>

      <div class="flex gap-2 w-full md:w-auto justify-center md:justify-end">
        <label class="input flex items-center w-full md:w-auto">
          <svg
            class="h-[1em] opacity-50"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
          >
            <g
              stroke-linejoin="round"
              stroke-linecap="round"
              stroke-width="2.5"
              fill="none"
              stroke="currentColor"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </g>
          </svg>

          <input id="search-input"   type="search" placeholder="Search issues..." class="grow" />
        </label>

        <button onclick="searchIssues()" class="btn btn-primary">
          <i class="fa-solid fa-plus"></i> New Issue
        </button>
      </div>
    </header>

    <main class="container mx-auto max-w-[1110px]">
      <!-- 3 tabs -->
      <div class="bg-base-100 gap-2.5 shadow p-6 mb-4">
        <button
          onclick="
            loadIssues();
            setActiveTab('all-btn');
          "
          id="all-btn"
          class="btn py-3 px-10 active-tab"
        >
          All
        </button>
        <button
          onclick="
            showOpenIssues();
            setActiveTab('open-btn');
          "
          id="open-btn"
          class="btn py-3 px-10"
        >
          Open
        </button>
        <button
          onclick="
            showClosedIssues();
            setActiveTab('closed-btn');
          "
          id="closed-btn"
          class="btn py-3 px-10"
        >
          Closed
        </button>
      </div>

      <div
        class="bg-base-100 gap-2.5 shadow p-6 flex justify-between items-center"
      >
        <div class="left flex items-center flex-1 gap-2.5">
          <img src="./assets/Aperture.png" alt="" />
          <div>
           <h2 id="issue-count" class="text-[20px] font-semibold">0 Issues</h2>
            <p class="text-[#64748B]">Track and manage your project issues</p>
          </div>
        </div>
        <div class="right flex items-center gap-4">
          <img src="./assets/green.png.png" alt="" />
          <p>Open</p>
          <img src="./assets/purple.png.png" alt="" />
          <p>Closed</p>
        </div>
      </div>

      <div id="loading-spinner" class="hidden text-center py-10">
        <span class="loading loading-ring loading-xl"></span>
      </div>

      <div
        class="bg-base-100 shadow grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 p-4"
        id="issues-container"
      >
    
    </div>
    </main>
    <script src="./main.js"></script>
  </body>
</html>
