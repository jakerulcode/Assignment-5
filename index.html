<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>github | login</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- taiwnd+daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="container mx-auto max-w-[520px] shadow-2xl my-20 p-8 space-y-6">
      <!-- logo section -->
      <div class="logo-section flex flex-col justify-between items-center">
        <img src="./assets/github-logo.png" alt="" class="mb-6" />
        <h2 class="text-2xl text-[#1F2937] font-bold">GitHub Issues Tracker</h2>
        <p class="text-[#64748B]">Sign in to manage your issues</p>
      </div>

      <!-- login section -->

      <div class="">
        <legend class="fieldset-legend">Username</legend>
        <input id="user-name" type="text" class="input w-full" placeholder="Enter Username" value="admin" />
        <p class="label text-[#4A00FF] text-[14px]">Default: admin</p>
        
        
        <legend class="fieldset-legend">Password</legend>
        <input id="user-pin" type="password" class="input w-full" placeholder="Enter Password" />
        <p class="label text-[#4A00FF] text-[14px]">Default: admin123</p>
      </div>
      
      
      <button id="login-btn" class="btn btn-primary w-full">Sign In</button>

      <div class="divider">OR</div>

      <div>
        <p class="text-[#64748B] text-[14px] text-center mb-2.5">
          Demo Credentials
        </p>
        <div class="card bg-base-300 rounded-box grid h-20 place-items-center p-6">
          <p><span class="font-bold">Username:</span> admin</p>
          <p><span class="font-bold">Password:</span> admin123</p>
        </div>
      </div>
    </div>
    <script src="./index.js"></script>
  </body>
</html>
